<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Portale Esercizi - Alessio Capuni</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f2f2f2;
            margin: 0;
            padding: 0;
        }

        header {
            background: #0055aa;
            color: white;
            padding: 20px;
            text-align: center;
        }

        .container {
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 40px;
            flex-wrap: wrap;
        }

        .card {
            background: white;
            width: 250px;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.05);
            background: #e8f0ff;
        }

        /* POPUP */
        .popup-bg {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            justify-content: center;
            align-items: center;
        }

        .popup {
            background: white;
            padding: 25px;
            width: 400px;
            border-radius: 12px;
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from {opacity: 0; transform: scale(0.8);}
            to {opacity: 1; transform: scale(1);}
        }

        .sub-card {
            background: #f7f7f7;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            transition: 0.2s;
        }

        .sub-card:hover {
            background: #dfe9ff;
        }

        .close-btn {
            background: red;
            color: white;
            padding: 8px 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            float: right;
        }

        #counter {
            text-align: center;
            font-size: 18px;
            margin-top: 10px;
            color: #333;
        }
    </style>
</head>
<body>

<header>
    <h1>Portale Esercizi TPS</h1>
    <h3>Studente: Alessio Capuni</h3>
</header>

<div id="counter">Totale esercizi: <b>9</b></div>

<div class="container">
    <div class="card" onclick="openPopup('es03')">ES03</div>
    <div class="card" onclick="openPopup('es04')">ES04</div>
    <div class="card" onclick="openPopup('es05')">ES05</div>
</div>

<!-- POPUP -->
<div id="popup-bg" class="popup-bg">
    <div class="popup">
        <button class="close-btn" onclick="closePopup()">X</button>
        <h2 id="popup-title"></h2>
        <div id="popup-content"></div>
    </div>
</div>

<script>
    const esercizi = {
        es03: [
            { id: "es03a", desc: "Descrizione esercizio 03A", link: "#" },
            { id: "es03b", desc: "Descrizione esercizio 03B", link: "#" },
            { id: "es03c", desc: "Descrizione esercizio 03C", link: "#" },
            { id: "es03d", desc: "Descrizione esercizio 03D", link: "#" }
        ],
        es04: [
            { id: "es04a", desc: "Descrizione esercizio 04A", link: "#" },
            { id: "es04b", desc: "Descrizione esercizio 04B", link: "#" },
            { id: "es04c", desc: "Descrizione esercizio 04C", link: "#" }
        ],
        es05: [
            { id: "es05a", desc: "Descrizione esercizio 05A", link: "#" },
            { id: "es05b", desc: "Descrizione esercizio 05B", link: "#" }
        ]
    };

    function openPopup(key) {
        const popup = document.getElementById("popup-bg");
        const title = document.getElementById("popup-title");
        const content = document.getElementById("popup-content");

        title.textContent = key.toUpperCase();

        content.innerHTML = esercizi[key].map(ex => `
            <div class="sub-card">
                <h3>${ex.id.toUpperCase()}</h3>
                <p>${ex.desc}</p>
                <a href="${ex.link}" target="_blank">Vai all'esercizio</a>
            </div>
        `).join("");

        popup.style.display = "flex";
    }

    function closePopup() {
        document.getElementById("popup-bg").style.display = "none";
    }
</script>

</body>
